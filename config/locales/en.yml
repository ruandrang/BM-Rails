  guide:
    page_title: "User Guide"
    page_subtitle: "A guide to the main features of Basketball Club Manager."
    beta_warning_title: "Currently in beta service."
    beta_warning_desc: "The service address may change or data may be reset during development. If you encounter any issues, please let us know through feedback and we'll respond promptly."
    sections:
      club:
        title: "Club Management"
        subtitle: "Create, edit, and delete clubs"
        create_title: "Create a Club"
        create_desc: "Tap <kbd>+ New Club</kbd> on the home screen to create a club. You can set the name, icon, and regular meeting days."
        edit_title: "Edit / Delete Club"
        edit_desc: "On the club detail page, you can edit (pencil icon) or delete (trash icon). Only the club owner can delete."
      member:
        title: "Member Management"
        subtitle: "Register members, CSV management, reorder"
        register_title: "Register Members"
        register_desc: "Add members by entering name, position (PG/SG/SF/PF/C), jersey number, age, and height."
        csv_title: "CSV Import / Export"
        csv_desc: "Register multiple members at once via CSV file, or export the current list."
        reorder_title: "Reorder"
        reorder_desc: "Drag member cards to reorder. Changes are saved automatically."
      match:
        title: "Matches & Team Assignment"
        subtitle: "Create matches, auto team assignment, shuffle"
        create_title: "Create a Match"
        create_desc: "Select a date, check participating members, then choose 2-team or 3-team match."
        auto_assign_title: "Auto Team Assignment"
        auto_assign_desc: "Automatically assigns based on position balance and past win rates. Members with fewer than 5 matches are calculated at 50% win rate."
        reassign_title: "Reassign Teams"
        reassign_desc: "Press <kbd>Shuffle</kbd> to reassign, or manually move members between teams."
        three_team_title: "3-Team Match"
        three_team_desc: "Selecting 3-team creates 3 games automatically: A vs B, A vs C, B vs C."
      scoreboard:
        title: "Scoreboard"
        subtitle: "Real-time score, timer, voice announcements"
        connected_title: "Connected Scoreboard"
        connected_desc: "Scoreboard linked to a match. The control screen and display are synchronized in real-time."
        standalone_title: "Standalone Scoreboard"
        standalone_desc: "Use without creating a match. Access from <kbd>Standalone Scoreboard</kbd> in the side menu."
        features_title: "Key Features"
        features_desc: "Score +/- controls, quarter timer, shot clock, voice announcements, and possession arrow switching."
      stats:
        title: "Statistics"
        subtitle: "Player win rates, match result sharing"
        player_stats_title: "Player Statistics"
        player_stats_desc: "Check each player's wins/losses/draws/win rate in the club dashboard under <kbd>Statistics</kbd>."
        share_title: "Share Match Results"
        share_desc: "Generate a share link from match details. Results can be viewed without logging in."
      membership:
        title: "Membership & Invitations"
        subtitle: "Role management, invite codes"
        roles_title: "Role Types"
        role_owner: "Owner"
        role_owner_desc: "Full permissions"
        role_admin: "Admin"
        role_admin_desc: "Matches/Members/Invitations"
        role_member: "Member"
        role_member_desc: "View/Scoreboard"
        invite_title: "Inviting Members"
        invite_desc: "Generate invite codes from the membership page. Set expiration time and max uses, then share the link for others to join."
      backup:
        title: "Data Backup / Restore"
        subtitle: "Manage data via JSON files"
        export_title: "Backup (Export)"
        export_desc: "Download all clubs, members, and match data as a JSON file from <kbd>Data Backup</kbd> in the side menu."
        import_title: "Restore (Import)"
        import_desc: "Upload a backup file on the same page to restore data. Existing data will be skipped."
      settings:
        title: "Settings"
        subtitle: "Profile, game time, voice, language"
        profile_title: "Profile"
        profile_desc: "Change the nickname displayed to other users."
        game_time_title: "Game Time"
        game_time_desc: "Set the default quarter time between 1-60 minutes."
        voice_title: "Voice Announcements"
        voice_desc: "Toggle voice announcements for score changes and timer end, and adjust speed."
        language_title: "Language"
        language_desc: "Choose from Korean, Japanese, English, or Chinese."
        possession_title: "Possession Arrow"
        possession_desc: "Select the quarter-based possession switch pattern. (Q1·Q2/Q3·Q4 or Q1·Q3/Q2·Q4)"
      login:
        title: "Login"
        subtitle: "Social login, email login"
        social_title: "Social Login"
        social_desc: "Log in easily with Kakao, Naver, or Google accounts. An account is automatically created on first login."
        email_title: "Email Login"
        email_desc: "Sign up and log in with email and password. Password must be at least 6 characters."
